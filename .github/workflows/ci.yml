name: Continuous Integration

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    
    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'

    - name: Validate lockfile sync
      run: |
        npm install --package-lock-only --dry-run
        if ! git diff --exit-code package-lock.json; then
          echo "❌ package-lock.json is out of sync with package.json"
          echo "Run 'npm install' locally and commit the updated lockfile"
          exit 1
        fi

    - name: Install dependencies
      run: npm ci

    - name: Check Types
      run: npm run check

    - name: Build project
      run: npm run build

    - name: Run tests
      run: npm run test

  docker-build-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Test Docker Development Build
      run: docker build --target development -t plp-dev-test .

    - name: Test Docker Production Build
      run: docker build --target production -t plp-prod-test .
