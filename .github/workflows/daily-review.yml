name: Daily Code Quality Review

on:
  schedule:
    # Run every day at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  review:
    name: Daily Code Quality Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get recent changes
        id: changes
        run: |
          # Get changes from last 24 hours
          CHANGES=$(git log --since="24 hours ago" --pretty=format:"%h - %s" --name-status)
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create daily review issue
        uses: actions/github-script@v7
        with:
          script: |
            const changes = `${{ steps.changes.outputs.changes }}`;
            
            if (!changes.trim()) {
              console.log('No changes in the last 24 hours');
              return;
            }

            const body = `## 📊 Daily Code Quality Report
            
            **Date:** ${new Date().toISOString().split('T')[0]}
            
            ### Recent Changes (Last 24 hours)
            \`\`\`
            ${changes}
            \`\`\`
            
            ### Action Items
            - [ ] Review recent commits for code quality
            - [ ] Check for TODO comments that need addressing
            - [ ] Verify test coverage for new features
            - [ ] Update documentation if needed
            
            ---
            *This is an automated daily review. Close this issue once reviewed.*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📊 Daily Code Review - ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['code-review', 'automated']
            });
