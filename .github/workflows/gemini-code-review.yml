name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["main", "develop", "staging"]

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- \
            '*.ts' '*.tsx' '*.js' '*.jsx' \
            ':!*.lock' ':!dist/**' ':!node_modules/**' \
            | head -c 5000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: AI Code Review Comment
        uses: actions/github-script@v8
        if: steps.diff.outputs.diff != ''
        with:
          script: |
            const diff = `${{ steps.diff.outputs.diff }}`;
            
            const reviewComment = `## 🤖 AI Code Review
            
            **Automated review of changes in this PR**
            
            ### 📊 Summary
            - Files changed: Check the Files tab
            - Lines of code: ${diff.split('\n').length} lines reviewed
            
            ### ✅ Checklist
            - [ ] Code follows project style guidelines
            - [ ] No obvious bugs or security issues
            - [ ] Tests added/updated for new features
            - [ ] Documentation updated if needed
            - [ ] No sensitive data exposed
            
            ### 💡 Suggestions
            - Review error handling in new code
            - Ensure TypeScript types are properly defined
            - Check for potential performance issues
            - Verify accessibility compliance
            
            ---
            *This is an automated review. Human review is still required.*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: reviewComment
            });
