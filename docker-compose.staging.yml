# docker-compose.staging.yml
# Usage: docker compose -f docker-compose.staging.yml up -d
name: personallearningpro-staging

services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-starknitish/personallearningpro}/personallearningpro:latest
    env_file: .env.staging
    ports:
      - "5001:5001"
    restart: unless-stopped
    environment:
      NODE_ENV: staging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
